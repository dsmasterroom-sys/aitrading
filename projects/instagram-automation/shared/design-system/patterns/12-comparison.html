<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparison Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-primary); background: var(--color-gray-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .canvas { width: var(--canvas-width); height: var(--canvas-height); background: var(--color-white); display: flex; flex-direction: column; }
    .compare-section { flex: 1; display: flex; flex-direction: column; position: relative; }
    .compare-section:first-child { border-bottom: var(--border-width) solid var(--color-black); }
    .compare-label { position: absolute; top: var(--space-md); left: var(--space-md); background: var(--color-primary-red); color: var(--color-white); padding: var(--space-sm) var(--space-md); font-size: var(--font-size-body); font-weight: var(--font-weight-bold); box-shadow: var(--shadow-brutal); text-transform: uppercase; z-index: 10; }
    .compare-section:last-child .compare-label { background: var(--color-primary-neon); color: var(--color-black); }
    .compare-image { width: 100%; height: 100%; object-fit: cover; }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="compare-section">
      <span class="compare-label">{{LABEL_BEFORE}}</span>
      <img class="compare-image" src="{{IMAGE_BEFORE}}" alt="Before">
    </div>
    <div class="compare-section">
      <span class="compare-label">{{LABEL_AFTER}}</span>
      <img class="compare-image" src="{{IMAGE_AFTER}}" alt="After">
    </div>
  </div>
</body>
</html>
