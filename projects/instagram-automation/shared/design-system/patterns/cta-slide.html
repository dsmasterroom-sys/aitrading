<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1440">
  <title>CTA Slide Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: var(--canvas-width);
      height: var(--canvas-height);
      font-family: var(--font-primary);
      overflow: hidden;
      background: linear-gradient(135deg, var(--color-primary-neon) 0%, var(--color-accent-cyan) 100%);
    }
    
    .cta-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-xl);
      text-align: center;
    }
    
    .cta-title {
      font-size: 72px;
      font-weight: var(--font-weight-bold);
      color: var(--color-black);
      line-height: 1.2;
      margin-bottom: var(--space-lg);
      text-shadow: 4px 4px 0 rgba(255, 255, 255, 0.5);
    }
    
    .cta-subtitle {
      font-size: var(--font-size-h2);
      font-weight: var(--font-weight-regular);
      color: var(--color-black);
      line-height: 1.4;
      margin-bottom: var(--space-xl);
      max-width: 800px;
    }
    
    .cta-button {
      background: var(--color-black);
      color: var(--color-white);
      font-size: var(--font-size-h2);
      font-weight: var(--font-weight-bold);
      padding: var(--space-lg) var(--space-xl);
      border: var(--border-width) solid var(--color-black);
      box-shadow: var(--shadow-strong);
      display: inline-block;
      text-decoration: none;
      margin-bottom: var(--space-md);
    }
    
    .cta-note {
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-regular);
      color: var(--color-black);
      opacity: 0.8;
    }
    
    .icon-arrow {
      display: inline-block;
      margin-left: var(--space-sm);
      font-size: 48px;
    }
  </style>
</head>
<body>
  <div class="cta-container">
    <h1 class="cta-title">{{TITLE}}</h1>
    <p class="cta-subtitle">{{SUBTITLE}}</p>
    
    <div class="cta-button">
      {{CTA_TEXT}}
      <span class="icon-arrow">→</span>
    </div>
    
    <p class="cta-note">{{NOTE}}</p>
  </div>
</body>
</html>

<!--
사용 예시:
{{TITLE}} = "더 많은 스타일이<br>궁금하다면?"
{{SUBTITLE}} = "매주 새로운 룩북을 만나보세요"
{{CTA_TEXT}} = "팔로우하기"
{{NOTE}} = "@gena_feed"
-->
