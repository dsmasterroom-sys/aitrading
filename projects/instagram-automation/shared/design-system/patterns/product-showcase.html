<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1440">
  <title>Product Showcase Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: var(--canvas-width);
      height: var(--canvas-height);
      font-family: var(--font-primary);
      overflow: hidden;
      background: var(--color-white);
    }
    
    .product-container {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      background: var(--color-white);
    }
    
    .product-image-section {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-gray-light);
    }
    
    .product-image {
      width: 90%;
      height: 90%;
      object-fit: contain;
      object-position: center;
    }
    
    .product-label {
      position: absolute;
      top: var(--space-lg);
      left: var(--space-lg);
      background: var(--color-black);
      color: var(--color-primary-neon);
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-bold);
      padding: var(--space-sm) var(--space-md);
      border: var(--border-width) solid var(--color-primary-neon);
    }
    
    .product-info-section {
      width: 100%;
      padding: var(--space-lg);
      background: var(--color-white);
      border-top: var(--border-width) solid var(--color-black);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    
    .product-brand {
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-bold);
      color: var(--color-gray-dark);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .product-name {
      font-size: var(--font-size-h2);
      font-weight: var(--font-weight-bold);
      color: var(--color-black);
      line-height: 1.3;
    }
    
    .product-price-row {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      margin-top: var(--space-sm);
    }
    
    .product-price-original {
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-regular);
      color: var(--color-gray-dark);
      text-decoration: line-through;
    }
    
    .product-price-sale {
      font-size: var(--font-size-h2);
      font-weight: var(--font-weight-bold);
      color: var(--color-primary-red);
    }
    
    .product-discount-badge {
      background: var(--color-primary-red);
      color: var(--color-white);
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-bold);
      padding: 4px var(--space-sm);
      border-radius: 4px;
    }
    
    .product-features {
      display: flex;
      gap: var(--space-sm);
      margin-top: var(--space-sm);
      flex-wrap: wrap;
    }
    
    .product-feature-tag {
      background: var(--color-gray-light);
      border: 2px solid var(--color-black);
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-regular);
      color: var(--color-black);
      padding: 6px var(--space-sm);
    }
    
    .product-cta {
      margin-top: var(--space-md);
      background: var(--color-primary-neon);
      border: var(--border-width) solid var(--color-black);
      box-shadow: var(--shadow-brutal);
      padding: var(--space-md);
      text-align: center;
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-bold);
      color: var(--color-black);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    
    .product-cta:hover {
      transform: translate(2px, 2px);
      box-shadow: 6px 6px 0 var(--color-black);
    }
  </style>
</head>
<body>
  <div class="product-container">
    <!-- 제품 이미지 섹션 -->
    <div class="product-image-section">
      <div class="product-label">{{LABEL}}</div>
      <img 
        src="{{IMAGE_URL}}" 
        alt="{{IMAGE_ALT}}" 
        class="product-image"
      >
    </div>
    
    <!-- 제품 정보 섹션 -->
    <div class="product-info-section">
      <div class="product-brand">{{BRAND}}</div>
      <h2 class="product-name">{{PRODUCT_NAME}}</h2>
      
      <!-- 가격 -->
      <div class="product-price-row">
        <span class="product-price-original">{{PRICE_ORIGINAL}}</span>
        <span class="product-price-sale">{{PRICE_SALE}}</span>
        <span class="product-discount-badge">{{DISCOUNT}}%</span>
      </div>
      
      <!-- 특징 태그 -->
      <div class="product-features">
        <span class="product-feature-tag">{{FEATURE_1}}</span>
        <span class="product-feature-tag">{{FEATURE_2}}</span>
        <span class="product-feature-tag">{{FEATURE_3}}</span>
      </div>
      
      <!-- CTA 버튼 -->
      <div class="product-cta">{{CTA_TEXT}}</div>
    </div>
  </div>
</body>
</html>

<!--
사용 예시:
{{LABEL}} = "BEST ITEM"
{{IMAGE_URL}} = "assets/carousel_slide_03.png"
{{IMAGE_ALT}} = "무신사 베이지 오버사이즈 니트"
{{BRAND}} = "MUSINSA STANDARD"
{{PRODUCT_NAME}} = "베이직 오버사이즈 니트"
{{PRICE_ORIGINAL}} = "79,000원"
{{PRICE_SALE}} = "59,000원"
{{DISCOUNT}} = "25"
{{FEATURE_1}} = "오버사이즈핏"
{{FEATURE_2}} = "4컬러"
{{FEATURE_3}} = "무료배송"
{{CTA_TEXT}} = "스와이프해서 자세히 보기 →"
-->
