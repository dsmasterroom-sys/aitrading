<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-primary); background: var(--color-gray-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .canvas { width: var(--canvas-width); height: var(--canvas-height); background: var(--color-white); padding: var(--space-xl); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: var(--space-lg); }
    .product-image { width: 75%; height: auto; max-height: 60%; object-fit: contain; border: var(--border-width) solid var(--color-black); box-shadow: var(--shadow-strong); }
    h1 { font-size: var(--font-size-h1); font-weight: var(--font-weight-bold); color: var(--color-black); text-align: center; text-transform: uppercase; }
    .info { display: flex; gap: var(--space-lg); align-items: baseline; }
    .price { font-size: var(--font-size-h2); font-weight: var(--font-weight-bold); color: var(--color-primary-red); background: var(--color-primary-yellow); padding: var(--space-sm); box-shadow: var(--shadow-brutal); }
    .brand { font-size: var(--font-size-body); color: var(--color-gray-dark); }
  </style>
</head>
<body>
  <div class="canvas">
    <img class="product-image" src="{{IMAGE_URL}}" alt="Product">
    <h1>{{TITLE}}</h1>
    <div class="info">
      <span class="price">{{PRICE}}</span>
      <span class="brand">{{BRAND}}</span>
    </div>
  </div>
</body>
</html>
