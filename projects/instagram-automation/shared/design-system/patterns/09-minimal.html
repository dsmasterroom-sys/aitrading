<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minimal Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-primary); background: var(--color-gray-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .canvas { width: var(--canvas-width); height: var(--canvas-height); background: var(--color-white); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: var(--space-xl); padding: var(--space-xl); }
    .minimal-image { width: 60%; height: auto; max-height: 50%; object-fit: contain; }
    h2 { font-size: var(--font-size-h2); font-weight: var(--font-weight-bold); color: var(--color-black); text-align: center; }
    .subtitle { font-size: var(--font-size-body); color: var(--color-gray-dark); text-align: center; }
  </style>
</head>
<body>
  <div class="canvas">
    <img class="minimal-image" src="{{IMAGE_URL}}" alt="Minimal">
    <h2>{{TITLE}}</h2>
    <p class="subtitle">{{SUBTITLE}}</p>
  </div>
</body>
</html>
