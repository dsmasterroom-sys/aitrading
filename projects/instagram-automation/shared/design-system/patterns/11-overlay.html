<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overlay Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-primary); background: var(--color-gray-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .canvas { width: var(--canvas-width); height: var(--canvas-height); position: relative; overflow: hidden; }
    .bg-image { width: 100%; height: 100%; object-fit: cover; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.7) 100%); display: flex; flex-direction: column; justify-content: flex-end; padding: var(--space-xl); gap: var(--space-md); }
    h1 { font-size: var(--font-size-h1); font-weight: var(--font-weight-bold); color: var(--color-white); line-height: 1.2; text-shadow: 4px 4px 0 var(--color-black); }
    p { font-size: var(--font-size-body); color: var(--color-white); }
  </style>
</head>
<body>
  <div class="canvas">
    <img class="bg-image" src="{{IMAGE_URL}}" alt="Background">
    <div class="overlay">
      <h1>{{TITLE}}</h1>
      <p>{{DESCRIPTION}}</p>
    </div>
  </div>
</body>
</html>
