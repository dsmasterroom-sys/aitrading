<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fullscreen Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-primary); background: var(--color-gray-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .canvas { width: var(--canvas-width); height: var(--canvas-height); background: var(--color-black); position: relative; overflow: hidden; }
    .fullscreen-image { width: 100%; height: 100%; object-fit: cover; }
    .watermark { position: absolute; bottom: var(--space-md); right: var(--space-md); background: var(--color-white); color: var(--color-black); padding: var(--space-sm); font-size: var(--font-size-caption); font-weight: var(--font-weight-bold); opacity: 0.9; }
  </style>
</head>
<body>
  <div class="canvas">
    <img class="fullscreen-image" src="{{IMAGE_URL}}" alt="Fullscreen">
    <div class="watermark">@{{BRAND}}</div>
  </div>
</body>
</html>
