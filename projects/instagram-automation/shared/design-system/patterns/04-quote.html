<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quote Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-primary); background: var(--color-gray-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .canvas { width: var(--canvas-width); height: var(--canvas-height); background: var(--color-primary-pink); padding: var(--space-xl); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: var(--space-lg); position: relative; }
    .quote-mark { font-size: 120px; font-weight: var(--font-weight-bold); color: var(--color-black); opacity: 0.2; position: absolute; top: var(--space-lg); left: var(--space-lg); }
    blockquote { font-size: var(--font-size-h1); font-weight: var(--font-weight-bold); color: var(--color-black); text-align: center; line-height: 1.3; max-width: 80%; }
    cite { font-size: var(--font-size-body); color: var(--color-white); font-style: normal; background: var(--color-black); padding: var(--space-sm) var(--space-md); box-shadow: var(--shadow-brutal); }
  </style>
</head>
<body>
  <div class="canvas">
    <span class="quote-mark">"</span>
    <blockquote>{{QUOTE}}</blockquote>
    <cite>— {{AUTHOR}}</cite>
  </div>
</body>
</html>
