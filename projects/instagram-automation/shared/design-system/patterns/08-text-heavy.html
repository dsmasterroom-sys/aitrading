<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text-Heavy Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-primary); background: var(--color-gray-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .canvas { width: var(--canvas-width); height: var(--canvas-height); background: var(--color-white); padding: var(--space-xl); display: flex; flex-direction: column; gap: var(--space-lg); }
    h1 { font-size: var(--font-size-h1); font-weight: var(--font-weight-bold); color: var(--color-black); line-height: 1.2; border-bottom: var(--border-width) solid var(--color-black); padding-bottom: var(--space-md); }
    .content { font-size: var(--font-size-body); color: var(--color-gray-dark); line-height: 1.6; flex: 1; }
    .highlight { background: var(--color-primary-neon); padding: 0 var(--space-xs); font-weight: var(--font-weight-bold); }
    .footer { font-size: var(--font-size-caption); color: var(--color-black); border-top: var(--border-width) solid var(--color-black); padding-top: var(--space-md); }
  </style>
</head>
<body>
  <div class="canvas">
    <h1>{{TITLE}}</h1>
    <div class="content">
      {{CONTENT}}
      <span class="highlight">{{HIGHLIGHT}}</span>
    </div>
    <div class="footer">{{FOOTER}}</div>
  </div>
</body>
</html>
