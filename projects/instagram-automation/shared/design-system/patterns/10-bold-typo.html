<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bold Typography Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-primary); background: var(--color-gray-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .canvas { width: var(--canvas-width); height: var(--canvas-height); background: var(--color-black); padding: var(--space-lg); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: var(--space-md); }
    .big-word { font-size: 96px; font-weight: var(--font-weight-bold); color: var(--color-primary-neon); line-height: 0.9; text-transform: uppercase; text-align: center; letter-spacing: -0.03em; }
    .sub-word { font-size: var(--font-size-h2); font-weight: var(--font-weight-bold); color: var(--color-white); text-transform: uppercase; }
    .accent-bar { width: 100%; height: var(--border-width); background: var(--color-primary-yellow); }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="big-word">{{BIG_WORD}}</div>
    <div class="accent-bar"></div>
    <div class="sub-word">{{SUB_WORD}}</div>
  </div>
</body>
</html>
