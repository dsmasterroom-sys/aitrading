<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1440">
  <title>Split Content Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: var(--canvas-width);
      height: var(--canvas-height);
      font-family: var(--font-primary);
      overflow: hidden;
      background: var(--color-white);
    }
    
    .split-container {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: 60% 40%;
    }
    
    .split-image-section {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
    
    .split-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    
    .split-image-border {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--border-width);
      background: var(--color-black);
    }
    
    .split-content-section {
      width: 100%;
      height: 100%;
      padding: var(--space-lg);
      background: var(--color-gray-light);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: var(--space-md);
    }
    
    .split-title {
      font-size: var(--font-size-h2);
      font-weight: var(--font-weight-bold);
      color: var(--color-black);
      line-height: 1.3;
      position: relative;
      padding-left: var(--space-md);
    }
    
    .split-title::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 6px;
      background: var(--color-primary-neon);
    }
    
    .split-body {
      font-size: var(--font-size-body);
      font-weight: var(--font-weight-regular);
      color: var(--color-gray-dark);
      line-height: 1.6;
      max-height: 300px;
      overflow: hidden;
    }
    
    .split-highlight-box {
      background: var(--color-primary-yellow);
      border: var(--border-width) solid var(--color-black);
      padding: var(--space-sm) var(--space-md);
      box-shadow: var(--shadow-brutal);
      display: inline-block;
      align-self: flex-start;
    }
    
    .split-highlight-text {
      font-size: var(--font-size-caption);
      font-weight: var(--font-weight-bold);
      color: var(--color-black);
    }
  </style>
</head>
<body>
  <div class="split-container">
    <!-- 이미지 섹션 (상단 60%) -->
    <div class="split-image-section">
      <img 
        src="{{IMAGE_URL}}" 
        alt="{{IMAGE_ALT}}" 
        class="split-image"
      >
      <div class="split-image-border"></div>
    </div>
    
    <!-- 콘텐츠 섹션 (하단 40%) -->
    <div class="split-content-section">
      <h2 class="split-title">{{TITLE}}</h2>
      <p class="split-body">{{BODY}}</p>
      
      <!-- 하이라이트 박스 (옵션) -->
      <div class="split-highlight-box">
        <span class="split-highlight-text">{{HIGHLIGHT}}</span>
      </div>
    </div>
  </div>
</body>
</html>

<!--
사용 예시:
{{IMAGE_URL}} = "assets/carousel_slide_02.png"
{{IMAGE_ALT}} = "오버사이즈 니트 코디"
{{TITLE}} = "포근한 니트의 계절"
{{BODY}} = "봄철 일교차가 큰 요즘, 가볍게 걸치기 좋은 오버사이즈 니트를 추천합니다. 베이지 컬러로 어떤 아이템과도 잘 어울려요."
{{HIGHLIGHT}} = "💡 TIP: 슬림 진과 매치하면 균형감 UP"
-->
