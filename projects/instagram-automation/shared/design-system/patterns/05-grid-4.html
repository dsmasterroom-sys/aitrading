<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid-4 Pattern</title>
  <link rel="stylesheet" href="../design-tokens.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-primary); background: var(--color-gray-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .canvas { width: var(--canvas-width); height: var(--canvas-height); background: var(--color-white); padding: 0; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: var(--border-width); }
    .grid-item { background: var(--color-gray-light); display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; }
    .grid-item .label { position: absolute; bottom: var(--space-md); left: var(--space-md); background: var(--color-primary-neon); color: var(--color-black); padding: var(--space-sm); font-weight: var(--font-weight-bold); font-size: var(--font-size-caption); box-shadow: var(--shadow-brutal); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="grid-item">
      <img src="{{IMAGE_1}}" alt="Item 1">
      <span class="label">{{LABEL_1}}</span>
    </div>
    <div class="grid-item">
      <img src="{{IMAGE_2}}" alt="Item 2">
      <span class="label">{{LABEL_2}}</span>
    </div>
    <div class="grid-item">
      <img src="{{IMAGE_3}}" alt="Item 3">
      <span class="label">{{LABEL_3}}</span>
    </div>
    <div class="grid-item">
      <img src="{{IMAGE_4}}" alt="Item 4">
      <span class="label">{{LABEL_4}}</span>
    </div>
  </div>
</body>
</html>
