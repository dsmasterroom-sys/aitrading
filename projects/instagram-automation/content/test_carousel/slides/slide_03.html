<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1080, height=1440">
  <title>Simple Text Overlay</title>
  <style>
    :root {
      --color-primary-neon: #00FF41;
      --color-primary-yellow: #FFE600;
      --color-black: #000000;
      --color-white: #FFFFFF;
      --font-primary: 'Pretendard Variable', -apple-system, sans-serif;
      --font-size-h1: 48px;
      --font-size-body: 28px;
      --font-weight-bold: 800;
      --font-weight-regular: 400;
      --space-lg: 40px;
      --space-xl: 64px;
      --border-width: 4px;
      --shadow-brutal: 8px 8px 0 var(--color-black);
      --canvas-width: 1080px;
      --canvas-height: 1440px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: var(--canvas-width);
      height: var(--canvas-height);
      font-family: var(--font-primary);
      overflow: hidden;
      background: var(--color-white);
    }
    
    .container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    .background-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    
    .text-overlay {
      position: absolute;
      top: var(--space-xl);
      left: var(--space-lg);
      right: var(--space-lg);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .badge {
      background: var(--color-primary-yellow);
      color: var(--color-black);
      font-size: 28px;
      font-weight: var(--font-weight-bold);
      padding: 12px 24px;
      border: var(--border-width) solid var(--color-black);
      box-shadow: var(--shadow-brutal);
      display: inline-block;
      align-self: flex-start;
      transform: rotate(-2deg);
    }
    
    .title {
      font-size: var(--font-size-h1);
      font-weight: var(--font-weight-bold);
      color: var(--color-white);
      line-height: 1.2;
      text-shadow: 
        3px 3px 0 var(--color-black),
        -1px -1px 0 var(--color-black),
        1px -1px 0 var(--color-black),
        -1px 1px 0 var(--color-black),
        1px 1px 0 var(--color-black);
      max-width: 800px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img 
      src="../assets/carousel_slide_03.png" 
      alt="봄 캐주얼 룩" 
      class="background-image"
    >
    
    <div class="text-overlay">
      <div class="badge">BEST CASUAL</div>
      <h1 class="title">편안한 일상,<br>스타일은 유지하고 ✨</h1>
    </div>
  </div>
</body>
</html>
