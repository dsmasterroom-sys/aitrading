<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 02</title>
<link rel="stylesheet" href="../../../shared/design-tokens.css">
<style>
:root {
  --accent: #D93025;
  --cherry-lime: #C8D84E;
  --cherry-pink: #F2B5B5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  word-break: keep-all;
  font-family: var(--ff-primary);
  -webkit-font-smoothing: antialiased;
}
.slide {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  position: relative;
}
.slide img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.gradient-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 55%;
  background: linear-gradient(to top, rgba(26,26,26,0.85) 0%, rgba(26,26,26,0.4) 60%, transparent 100%);
}
.text-stack {
  position: absolute;
  bottom: 140px; left: var(--pad);
  max-width: 800px;
}
.label {
  font-family: var(--ff-accent);
  font-weight: 800;
  font-size: var(--fs-display);
  color: var(--text-light);
  line-height: var(--lh-display);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  margin-bottom: 24px;
}
.body-text {
  font-size: var(--fs-body);
  color: var(--text-light);
  line-height: var(--lh-body);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  margin-bottom: 20px;
}
.regret {
  font-family: var(--ff-accent);
  font-weight: 700;
  font-size: var(--fs-title);
  color: var(--text-light);
  opacity: 0.8;
  line-height: var(--lh-heading);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<div class="slide slide-02">
  <img src="../generated/slide_02.png" alt="문제 제기">
  <div class="gradient-bottom"></div>
  <div class="text-stack">
    <div class="label">작년의 나:</div>
    <div class="body-text">린넨 블라우스에<br>카디건 하나 걸치고<br>여의도 갔다가</div>
    <div class="regret">30분 만에 후회했다</div>
  </div>
</div>
</body>
</html>
