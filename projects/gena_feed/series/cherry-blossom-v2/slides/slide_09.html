<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 09</title>
<link rel="stylesheet" href="../../../shared/design-tokens.css">
<style>
:root {
  --accent: #D93025;
  --cherry-lime: #C8D84E;
  --cherry-pink: #F2B5B5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  word-break: keep-all;
  font-family: var(--ff-primary);
  -webkit-font-smoothing: antialiased;
}
.slide {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  position: relative;
}
.slide img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.gradient-left {
  position: absolute; top: 0; left: 0; bottom: 0;
  width: 60%;
  background: linear-gradient(to right, rgba(26,26,26,0.88) 0%, rgba(26,26,26,0.5) 55%, transparent 100%);
}
.numbered-list {
  position: absolute;
  top: 200px; left: var(--pad);
  display: flex;
  flex-direction: column;
  gap: 80px;
}
.list-item {
  display: flex;
  align-items: baseline;
  gap: 24px;
}
.item-number {
  font-family: var(--ff-accent);
  font-weight: 800;
  font-size: var(--fs-display);
  color: var(--text-light);
  line-height: 1;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  min-width: 100px;
}
.item-text {
  font-size: var(--fs-body);
  color: var(--text-light);
  line-height: var(--lh-heading);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  max-width: 400px;
}
.hand-bottom {
  position: absolute;
  bottom: 120px; left: var(--pad);
  font-family: var(--ff-hand);
  font-size: var(--fs-body);
  color: var(--text-light);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<div class="slide slide-09">
  <img src="../generated/slide_09.png" alt="요약 3줄">
  <div class="gradient-left"></div>
  <div class="numbered-list">
    <div class="list-item">
      <div class="item-number">01</div>
      <div class="item-text">겨울 이너 + 봄 아우터</div>
    </div>
    <div class="list-item">
      <div class="item-number">02</div>
      <div class="item-text">시간대별로 벗어라</div>
    </div>
    <div class="list-item">
      <div class="item-number">03</div>
      <div class="item-text">만개 후 3일 안에 가라</div>
    </div>
  </div>
  <div class="hand-bottom">이 세 줄이면 된다</div>
</div>
</body>
</html>
