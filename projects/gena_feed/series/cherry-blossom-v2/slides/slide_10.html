<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 10</title>
<link rel="stylesheet" href="../../../shared/design-tokens.css">
<style>
:root {
  --accent: #D93025;
  --cherry-lime: #C8D84E;
  --cherry-pink: #F2B5B5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  word-break: keep-all;
  font-family: var(--ff-primary);
  -webkit-font-smoothing: antialiased;
}
.slide {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  position: relative;
}
.slide img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.gradient-topleft {
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(26,26,26,0.8) 0%, rgba(26,26,26,0.4) 40%, transparent 70%);
}
.text-block {
  position: absolute;
  top: 140px; left: var(--pad);
  max-width: 750px;
}
.display-text {
  font-family: var(--ff-accent);
  font-weight: 800;
  font-size: var(--fs-display);
  color: var(--text-light);
  line-height: var(--lh-display);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  margin-bottom: 24px;
}
.title-stack {
  font-family: var(--ff-accent);
  font-weight: 700;
  font-size: var(--fs-title);
  color: var(--text-light);
  line-height: var(--lh-heading);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  margin-bottom: 48px;
}
.cta-hand {
  font-family: var(--ff-hand);
  font-size: var(--fs-body);
  color: var(--text-light);
  line-height: var(--lh-body);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  margin-bottom: 20px;
}
.follow-text {
  font-size: var(--fs-caption);
  color: var(--text-light);
  opacity: 0.7;
  line-height: var(--lh-body);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}
.handle {
  position: absolute;
  bottom: 60px; right: var(--pad);
  font-size: var(--fs-caption);
  color: var(--text-light);
  opacity: 0.7;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}
</style>
</head>
<body>
<div class="slide slide-10">
  <img src="../generated/slide_10.png" alt="CTA 다음 편 예고">
  <div class="gradient-topleft"></div>
  <div class="text-block">
    <div class="display-text">다음 편 —</div>
    <div class="title-stack">벚꽃 스팟별<br>사진 잘 나오는<br>시간대 × 앵글</div>
    <div class="cta-hand">저장 안 하면 4월에 검색할 자신 있어?</div>
    <div class="follow-text">팔로우 해두면 다음 편 놓치지 않는다</div>
  </div>
  <div class="handle">@gena_feed</div>
</div>
</body>
</html>
