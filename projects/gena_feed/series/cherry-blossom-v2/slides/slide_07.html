<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 07</title>
<link rel="stylesheet" href="../../../shared/design-tokens.css">
<style>
:root {
  --accent: #D93025;
  --cherry-lime: #C8D84E;
  --cherry-pink: #F2B5B5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  word-break: keep-all;
  font-family: var(--ff-primary);
  -webkit-font-smoothing: antialiased;
}
.slide {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  position: relative;
}
.slide img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.overlay-white {
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.25);
}
.center-block {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -55%);
  text-align: center;
}
.giant-number {
  font-family: var(--ff-accent);
  font-weight: 800;
  font-size: 144px;
  color: var(--accent);
  line-height: 1;
  text-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.sub-body {
  font-size: var(--fs-body);
  color: var(--text-dark);
  line-height: var(--lh-body);
  margin-top: 32px;
  text-shadow: 0 1px 4px rgba(255,255,255,0.6);
  text-align: center;
}
.info-bar {
  position: absolute;
  bottom: 80px; left: var(--pad); right: var(--pad);
  font-size: var(--fs-caption);
  color: var(--text-dark);
  line-height: var(--lh-body);
  text-shadow: 0 1px 4px rgba(255,255,255,0.6);
  text-align: left;
  background: rgba(255,255,255,0.45);
  padding: 24px 32px;
  border-radius: 4px;
}
</style>
</head>
<body>
<div class="slide slide-07">
  <img src="../generated/slide_07.png" alt="골든 윈도우">
  <div class="overlay-white"></div>
  <div class="center-block">
    <div class="giant-number">3~4일</div>
    <div class="sub-body">만개 후 이 안에 못 가면<br>내년을 기약해야 한다</div>
  </div>
  <div class="info-bar">서울 개화 4/1~4 · 만개 4/8~13 · 여의도는 2~3일 빠르다</div>
</div>
</body>
</html>
