<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 03</title>
<link rel="stylesheet" href="../../../shared/design-tokens.css">
<style>
:root {
  --accent: #D93025;
  --cherry-lime: #C8D84E;
  --cherry-pink: #F2B5B5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  word-break: keep-all;
  font-family: var(--ff-primary);
  -webkit-font-smoothing: antialiased;
}
.slide {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  position: relative;
}
.slide img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.6) 100%);
}
.giant-number {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--ff-accent);
  font-weight: 800;
  font-size: 144px;
  color: var(--accent);
  line-height: 1;
  text-shadow: 3px 3px 16px rgba(0,0,0,0.4);
}
/* Wind curve SVG decoration */
.wind-svg {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(80px, -90px);
  opacity: 0.5;
}
.sub-text {
  position: absolute;
  bottom: 160px; right: var(--pad);
  text-align: right;
  font-size: var(--fs-caption);
  color: var(--text-light);
  line-height: var(--lh-body);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  max-width: 500px;
}
</style>
</head>
<body>
<div class="slide slide-03">
  <img src="../generated/slide_03.png" alt="18도 체감온도">
  <div class="vignette"></div>
  <div class="giant-number">18°C</div>
  <svg class="wind-svg" width="120" height="60" viewBox="0 0 120 60" fill="none">
    <path d="M0 45 C30 45, 30 15, 60 15 S90 45, 120 15" stroke="#F2EDE8" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M0 55 C25 55, 35 30, 65 30 S95 55, 120 30" stroke="#F2EDE8" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
    <path d="M10 35 C35 35, 40 10, 70 10 S100 35, 120 5" stroke="#F2EDE8" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </svg>
  <div class="sub-text">수변 벚꽃 명소의<br>기온과 체감온도 차이.<br>바람이 전부 가져간다</div>
</div>
</body>
</html>
