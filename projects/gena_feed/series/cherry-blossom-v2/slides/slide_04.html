<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<title>Slide 04</title>
<link rel="stylesheet" href="../../../shared/design-tokens.css">
<style>
:root {
  --accent: #D93025;
  --cherry-lime: #C8D84E;
  --cherry-pink: #F2B5B5;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  word-break: keep-all;
  font-family: var(--ff-primary);
  -webkit-font-smoothing: antialiased;
}
.slide {
  width: var(--canvas-carousel-w);
  height: var(--canvas-carousel-h);
  overflow: hidden;
  position: relative;
}
.slide img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}
.gradient-bottom {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 50%;
  background: linear-gradient(to top, rgba(26,26,26,0.85) 0%, rgba(26,26,26,0.3) 60%, transparent 100%);
}
.text-block {
  position: absolute;
  bottom: 140px; right: var(--pad);
  text-align: right;
  max-width: 700px;
}
.display-text {
  font-family: var(--ff-accent);
  font-weight: 800;
  font-size: var(--fs-display);
  color: var(--text-light);
  line-height: var(--lh-display);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
}
.title-text {
  font-family: var(--ff-accent);
  font-weight: 700;
  font-size: var(--fs-title);
  color: var(--text-light);
  line-height: var(--lh-heading);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  margin-top: 16px;
}
.caption-text {
  font-size: var(--fs-caption);
  color: var(--text-light);
  opacity: 0.7;
  line-height: var(--lh-body);
  text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
  margin-top: 24px;
}
</style>
</head>
<body>
<div class="slide slide-04">
  <img src="../generated/slide_04.png" alt="실패 공식">
  <div class="gradient-bottom"></div>
  <div class="text-block">
    <div class="display-text">봄옷 = 벚꽃룩?</div>
    <div class="title-text">완벽한 실패 공식</div>
    <div class="caption-text">인스타 속 그 언니도<br>촬영 끝나자마자 패딩 입었다</div>
  </div>
</div>
</body>
</html>
