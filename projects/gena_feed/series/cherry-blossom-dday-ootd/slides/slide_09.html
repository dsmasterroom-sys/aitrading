<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>

:root {
  --primary: #1A1A1A;
  --secondary: #6B6B6B;
  --accent: #D93025;
  --surface-dark: #1A1A1A;
  --surface-cream: #F2EDE8;
  --surface-cool: #E2DEDA;
  --surface-mid: #D0CBC6;
  --surface-accent: #D93025;
  --text-dark: #1A1A1A;
  --text-mid: #555555;
  --text-light: #F2EDE8;
  --fs-display: 72px;
  --fs-title: 56px;
  --fs-body: 36px;
  --fs-caption: 28px;
  --lh-display: 1.1;
  --lh-heading: 1.2;
  --lh-body: 1.6;
  --ls-heading: -0.02em;
  --ls-body: 0em;
  --pad: 80px;
  --gap: 40px;
  --gap-sm: 24px;
  --canvas-carousel-w: 1080px;
  --canvas-carousel-h: 1350px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { width: var(--canvas-carousel-w); height: var(--canvas-carousel-h); overflow:hidden; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
.canvas { width: var(--canvas-carousel-w); height: var(--canvas-carousel-h); overflow:hidden; position:relative; word-break:keep-all; }

</style></head><body>

<div class="canvas" style="background:var(--surface-cream);display:flex;flex-direction:column;justify-content:center;padding:var(--pad);">
  <h2 style="color:var(--text-dark);font-size:var(--fs-title);line-height:var(--lh-heading);letter-spacing:var(--ls-heading);margin-bottom:var(--gap);">벚꽃 D-day<br>준비 체크리스트</h2>
  <div style="display:flex;flex-direction:column;">
    
    <div style="display:flex;align-items:center;gap:var(--gap-sm);padding:28px 0;border-bottom:1px solid rgba(0,0,0,0.08);">
      <div style="width:48px;height:48px;border:3px solid var(--text-dark);border-radius:10px;flex-shrink:0;"></div>
      <p style="color:var(--text-dark);font-size:var(--fs-body);font-weight:400;line-height:var(--lh-body);">레이어링 조합 1벌 확보</p>
    </div>
    <div style="display:flex;align-items:center;gap:var(--gap-sm);padding:28px 0;border-bottom:1px solid rgba(0,0,0,0.08);">
      <div style="width:48px;height:48px;border:3px solid var(--text-dark);border-radius:10px;flex-shrink:0;"></div>
      <p style="color:var(--text-dark);font-size:var(--fs-body);font-weight:400;line-height:var(--lh-body);">크로스백·소품 세팅</p>
    </div>
    <div style="display:flex;align-items:center;gap:var(--gap-sm);padding:28px 0;border-bottom:1px solid rgba(0,0,0,0.08);">
      <div style="width:48px;height:48px;border:3px solid var(--accent);border-radius:10px;flex-shrink:0;"></div>
      <p style="color:var(--accent);font-size:var(--fs-body);font-weight:700;line-height:var(--lh-body);">개화 일정 캘린더 저장</p>
    </div>
    <div style="display:flex;align-items:center;gap:var(--gap-sm);padding:28px 0;border-bottom:1px solid rgba(0,0,0,0.08);">
      <div style="width:48px;height:48px;border:3px solid var(--text-dark);border-radius:10px;flex-shrink:0;"></div>
      <p style="color:var(--text-dark);font-size:var(--fs-body);font-weight:400;line-height:var(--lh-body);">포토스팟 리스트업</p>
    </div>
  </div>
  <div style="position:absolute;bottom:100px;right:100px;font-size:64px;opacity:0.12;">🌸</div>
</div>

</body></html>
