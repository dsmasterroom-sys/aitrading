<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>

:root {
  --primary: #1A1A1A;
  --secondary: #6B6B6B;
  --accent: #D93025;
  --surface-dark: #1A1A1A;
  --surface-cream: #F2EDE8;
  --surface-cool: #E2DEDA;
  --surface-mid: #D0CBC6;
  --surface-accent: #D93025;
  --text-dark: #1A1A1A;
  --text-mid: #555555;
  --text-light: #F2EDE8;
  --fs-display: 72px;
  --fs-title: 56px;
  --fs-body: 36px;
  --fs-caption: 28px;
  --lh-display: 1.1;
  --lh-heading: 1.2;
  --lh-body: 1.6;
  --ls-heading: -0.02em;
  --ls-body: 0em;
  --pad: 80px;
  --gap: 40px;
  --gap-sm: 24px;
  --canvas-carousel-w: 1080px;
  --canvas-carousel-h: 1350px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body { width: var(--canvas-carousel-w); height: var(--canvas-carousel-h); overflow:hidden; font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif; }
.canvas { width: var(--canvas-carousel-w); height: var(--canvas-carousel-h); overflow:hidden; position:relative; word-break:keep-all; }

</style></head><body>

<div class="canvas" style="background:var(--surface-cream);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:var(--pad);">
  <h2 style="color:var(--text-dark);font-size:var(--fs-title);line-height:var(--lh-heading);letter-spacing:var(--ls-heading);text-align:center;margin-bottom:var(--gap);">매년 반복되는 벚꽃 루틴</h2>
  <div style="display:flex;flex-direction:column;gap:var(--gap-sm);width:100%;max-width:860px;">
    <div style="background:white;border-radius:16px;padding:40px 48px;box-shadow:0 2px 12px rgba(0,0,0,0.06);transform:rotate(-1.5deg);">
      <p style="color:var(--text-dark);font-size:var(--fs-body);line-height:var(--lh-body);">옷 고르다 만개 놓치고</p>
    </div>
    <div style="background:white;border-radius:16px;padding:40px 48px;box-shadow:0 2px 12px rgba(0,0,0,0.06);transform:rotate(1deg);">
      <p style="color:var(--text-dark);font-size:var(--fs-body);line-height:var(--lh-body);">결국 패딩에 운동화</p>
    </div>
    <div style="background:white;border-radius:16px;padding:40px 48px;box-shadow:0 2px 12px rgba(0,0,0,0.06);transform:rotate(-0.5deg);">
      <p style="color:var(--text-mid);font-size:var(--fs-body);line-height:var(--lh-body);">사진 속 나만 계절 무시한 사람</p>
    </div>
  </div>
  <div style="position:absolute;top:120px;right:100px;font-size:80px;opacity:0.15;">🌸</div>
  <div style="position:absolute;bottom:160px;left:80px;font-size:60px;opacity:0.12;">🌸</div>
</div>

</body></html>
